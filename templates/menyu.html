<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menýu - PUBG Turnuvasy</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 45, 85, 0.15);
            padding: 8px 0 12px;
        }
        .bottom-nav-container {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            padding: 4px 12px;
            border-radius: 12px;
        }
        .bottom-nav-item i {
            font-size: 20px;
        }
        .bottom-nav-item.active {
            color: #ff2d55;
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 80px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 20px 22px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-decoration: none;
            color: #e8e8e8;
            transition: all 0.3s;
        }
        .menu-item:hover {
            background: rgba(255, 45, 85, 0.06);
            border-color: rgba(255, 45, 85, 0.2);
            transform: translateX(6px);
        }
        .menu-icon {
            font-size: 22px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255, 45, 85, 0.15), rgba(0, 150, 255, 0.1));
            border-radius: 14px;
            color: #ff2d55;
        }
        .menu-info h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .menu-info p {
            font-size: 12px;
            opacity: 0.6;
            color: #a0a0c0;
        }
        .logout-form {
            margin: 0;
            padding: 0;
        }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 20px 22px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            border: 1px solid rgba(255, 45, 85, 0.2);
            color: #e8e8e8;
            transition: all 0.3s;
            width: 100%;
            font-family: inherit;
            font-size: inherit;
            cursor: pointer;
            text-align: left;
        }
        .logout-btn:hover {
            background: rgba(255, 45, 85, 0.06);
            border-color: rgba(255, 45, 85, 0.4);
            transform: translateX(6px);
        }
        .logout-btn .menu-icon {
            background: rgba(255, 45, 85, 0.1);
        }
        .logout-btn h3 {
            color: #ff2d55;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .logout-btn p {
            font-size: 12px;
            opacity: 0.6;
            color: #a0a0c0;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container main-content">
        <header class="form-header" style="padding: 20px 0 16px;">
            <h1 style="font-family: 'Orbitron', sans-serif; font-size: 22px; color: #ff2d55; letter-spacing: 3px;">MENÝU</h1>
        </header>

        <div class="menu-list">
            <a href="/profil" class="menu-item">
                <div class="menu-icon"><i class="fas fa-user"></i></div>
                <div class="menu-info">
                    <h3>Profilim</h3>
                    <p>Hasap maglumatlarym</p>
                </div>
            </a>
            <a href="/" class="menu-item">
                <div class="menu-icon"><i class="fas fa-home"></i></div>
                <div class="menu-info">
                    <h3>Esasy Sahypa</h3>
                    <p>Bas sahypa</p>
                </div>
            </a>
            <a href="/turnir" class="menu-item">
                <div class="menu-icon"><i class="fas fa-trophy"></i></div>
                <div class="menu-info">
                    <h3>Turnirler</h3>
                    <p>Turnir sanawy</p>
                </div>
            </a>
            <a href="/magazyn" class="menu-item">
                <div class="menu-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="menu-info">
                    <h3>Magazyn</h3>
                    <p>Oýun harytlary</p>
                </div>
            </a>
            <form action="/logout" method="POST" class="logout-form" onsubmit="return confirm('Hakykatdanam cykmak isleyarsinizmi?');">
                <button type="submit" class="logout-btn">
                    <div class="menu-icon"><i class="fas fa-sign-out-alt"></i></div>
                    <div>
                        <h3>Çykyş</h3>
                        <p>Hasapdan çyk</p>
                    </div>
                </button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-container">
            <a href="/" class="bottom-nav-item">
                <i class="fas fa-home"></i>
                <span>Esasy</span>
            </a>
            <a href="/turnir" class="bottom-nav-item">
                <i class="fas fa-trophy"></i>
                <span>Turnir</span>
            </a>
            <a href="/magazyn" class="bottom-nav-item">
                <i class="fas fa-shopping-cart"></i>
                <span>Magazyn</span>
            </a>
            <a href="/menyu" class="bottom-nav-item active">
                <i class="fas fa-bars"></i>
                <span>Menýu</span>
            </a>
        </div>
    </nav>
</body>
</html>
