<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giris - PUBG Turnir</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container main-content">
        <header class="form-header">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Yza</a>
            <h1>GIRIS</h1>
            <p>Hasabyňyza girin</p>
        </header>

        <form id="login-form" class="registration-form" novalidate>
            <div class="form-group">
                <label for="telefon"><i class="fas fa-mobile-alt"></i> Telefon Nomeri</label>
                <input type="tel" id="telefon" name="telefon" placeholder="+993 XX XXX XXX" required maxlength="20" autocomplete="tel">
            </div>

            <div class="form-group">
                <label for="parol"><i class="fas fa-key"></i> Parol</label>
                <input type="password" id="parol" name="parol" placeholder="Parolyňyz" required minlength="6" maxlength="100" autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit" id="login-btn">
                <span class="btn-text">GIR</span>
                <span class="btn-loader" style="display:none;"><i class="fas fa-hourglass-half" style="color:#ff8c00"></i></span>
            </button>
        </form>

        <div style="text-align:center; margin-top:24px; padding:20px;">
            <p style="opacity:0.7; font-size:14px;">Hasabyňyz ýokmy? <a href="/kayit" style="color:#ff2d55; text-decoration:none; font-weight:700;">Registrasiýa</a></p>
        </div>
    </div>

    <script>
        let csrfToken = '';

        async function getCsrfToken() {
            try {
                const response = await fetch('/api/csrf-token');
                const result = await response.json();
                if (result.success) csrfToken = result.csrf_token;
            } catch (error) {
                console.error('CSRF token almakda yalnyslyk:', error);
            }
        }

        getCsrfToken();

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const telefon = document.getElementById('telefon').value.trim();
            const parol = document.getElementById('parol').value;

            if (!telefon || !parol) {
                alert('Telefon we parol girizin!');
                return;
            }

            if (!csrfToken) {
                alert('CSRF token tapylmady. Sahypany tezeleyn.');
                await getCsrfToken();
                if (!csrfToken) return;
            }

            const btn = document.getElementById('login-btn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline';
            btn.disabled = true;

            const data = {
                telefon: telefon,
                parol: parol,
                csrf_token: csrfToken
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error('Server yalnyslygy: ' + response.status);
                }

                const result = await response.json();

                if (result.success) {
                    window.location.href = '/profil';
                } else {
                    alert(result.message || 'Telefon ýa-da parol nadogry!');
                    await getCsrfToken();
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Yalnyslyk yuze cykdy: ' + error.message);
                await getCsrfToken();
            } finally {
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
