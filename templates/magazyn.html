<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazyn - PUBG Turnuvasy</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 45, 85, 0.15);
            padding: 8px 0 12px;
        }
        .bottom-nav-container {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            padding: 4px 12px;
            border-radius: 12px;
        }
        .bottom-nav-item i {
            font-size: 20px;
        }
        .bottom-nav-item.active {
            color: #ff2d55;
        }
        .coming-soon {
            text-align: center;
            padding: 60px 20px;
        }
        .coming-soon i {
            font-size: 64px;
            color: #ff2d55;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .coming-soon h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: #ff2d55;
            margin-bottom: 10px;
        }
        .coming-soon p {
            opacity: 0.6;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container main-content">
        <header class="form-header" style="padding: 20px 0 16px;">
            <h1 style="font-family: 'Orbitron', sans-serif; font-size: 22px; color: #ff2d55; letter-spacing: 3px;">MAGAZYN</h1>
        </header>

        <div class="coming-soon">
            <i class="fas fa-shopping-cart"></i>
            <h2>GELMEKDE</h2>
            <p>Magazyn bolumi gowusylyk bilen tayarlanylýar</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-container">
            <a href="/" class="bottom-nav-item">
                <i class="fas fa-home"></i>
                <span>Esasy</span>
            </a>
            <a href="/turnir" class="bottom-nav-item">
                <i class="fas fa-trophy"></i>
                <span>Turnir</span>
            </a>
            <a href="/magazyn" class="bottom-nav-item active">
                <i class="fas fa-shopping-cart"></i>
                <span>Magazyn</span>
            </a>
            <a href="/menyu" class="bottom-nav-item">
                <i class="fas fa-bars"></i>
                <span>Menýu</span>
            </a>
        </div>
    </nav>
</body>
</html>
